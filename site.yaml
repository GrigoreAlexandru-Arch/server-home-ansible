---
- name: Deploy Home Server Environment
  hosts: homeserver
  become: true
  gather_facts: true

  roles:
    - role: common
    - role: storage
    - role: docker
    - role: wireguard

  post_tasks:
    - name: Final Status
      ansible.builtin.debug:
        msg: "Server setup complete. WireGuard and Docker Stack are active."
